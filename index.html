<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Guild</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lobster&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navigation Bar -->
    <header class="bg-white shadow-sm position-relative z-index-top">
        <div class="container-fluid px-0">
            <nav class="navbar navbar-expand-lg navbar-light py-0">
                
                <a class="navbar-brand ml-4 py-3" href="#">
                    <span class="text-danger font-weight-bold brand-text">APEX</span> 
                    <span class="text-dark font-weight-bold brand-text">GUILD</span>
                </a>

                <div class="collapse navbar-collapse d-flex justify-content-center" id="navbarNav">
                    <ul class="navbar-nav align-items-center custom-nav-menu">
                        <li class="nav-item active-nav">
                            <a class="nav-link" href="#"><span class="unskew">HOME</span></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#"><span class="unskew">SHOPS</span></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#"><span class="unskew">REVIEW</span></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#"><span class="unskew">BLOG</span></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#"><span class="unskew text-center">CONTACT US</span></a>
                        </li>
                    </ul>
                </div>

                    <div class="search-container justify-content-end mx-auto mr-4">
                        <input type="text" placeholder="SEARCH..." class="search-input">
                        <button class="search-btn"><i class="fas fa-search"></i></button>
                    </div>

                    <div class="cart-icon-container pl-4 mr-4">
                        <i class="fas fa-shopping-cart fa-lg"></i>
                        <span class="cart-badge">0</span>
                    </div>
                
            </nav>
        </div>
    </header>
<!-- End of Navigation Bar -->

<!-- Hero Section -->
    <main class="hero-section position-relative overflow-hidden">
        
        <div class="hero-bg-image position-absolute w-100 h-100"></div>
        <div class="hero-bg-overlay position-absolute w-100 h-100"></div>

        <div class="hero-red-skew position-absolute"></div>

        <div class="container-fluid h-100 position-relative content-wrapper">
            <div class="row h-100 align-items-center">
                
                <div class="col-md-6 h-100 d-flex flex-column justify-content-center position-relative product-col">
                    
                    <div class="product-image-wrapper">
                        <img src="images/Apex Guild.png" alt="Full Face Helmet" class="img-fluid helmet-img">
                    </div>
                    
                    <div class="product-feature-text mt-5 pl-5">
                        <h3 class="text-white text-uppercase">Polished Titanium Finish With A Bright Blue Glowing Visor</h3>
                    </div>
                </div>

                <div class="col-md-6 h-100 d-flex flex-column justify-content-center align-items-center right-content">
                    
                    <div class="hero-image-card">
                        <h2 class="text-white font-weight-bold text-uppercase sub-heading mb-0">Full Face</h2>
                        <h1 class="text-white font-weight-bold text-uppercase main-heading mb-2">Helmet</h1>
                        <p class="text-white description-text mb-4">Track racing, sports bikes, and high-speed highway commuting</p>
                        
                        <a href="#" class="btn btn-cta text-white font-weight-bold text-uppercase">Shop Now</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
<!-- End of Hero Section -->

<!-- Sales & Promotions Section -->
    <div class="container-fluid sales-section py-5">
        <h2 class="title-sale&promotion-section text-center mb-4">Sales & <span class="text-dark">Promotions</span></h2>
            <div id="carouselExampleSlidesOnly" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                    <img src="./images/sale-banner-1.png" class="d-block w-100" alt="...">
                    </div>
                    <div class="carousel-item">
                    <img src="./images/sale-banner-2.png" class="d-block w-100" alt="...">
                    </div>
                    <div class="carousel-item">
                    <img src="./images/sale-banner-3.png" class="d-block w-100" alt="...">
                    </div>
                </div>
            </div>
    </div>
<!-- End of Sales & Promotions Section -->

<!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>
</body>
</html>
