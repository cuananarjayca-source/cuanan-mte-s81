<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Guild</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="bg-white shadow-sm position-relative z-index-top">
        <div class="container-fluid px-0">
            <nav class="navbar navbar-expand-lg navbar-light py-0">
                
                <a class="navbar-brand ml-4 py-3" href="#">
                    <span class="text-danger font-weight-bold brand-text">APEX</span> 
                    <span class="text-dark font-weight-bold brand-text">GUILD</span>
                </a>

                <div class="collapse navbar-collapse d-flex justify-content-end" id="navbarNav">
                    <ul class="navbar-nav align-items-center custom-nav-menu">
                        <li class="nav-item active-nav">
                            <a class="nav-link" href="#"><span class="unskew">HOME</span></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#"><span class="unskew">SHOPS</span></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#"><span class="unskew">REVIEW</span></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#"><span class="unskew">BLOG</span></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#"><span class="unskew text-center">CONTACT<br>US</span></a>
                        </li>
                    </ul>

                    <div class="search-container mx-4">
                        <input type="text" placeholder="SEARCH..." class="search-input">
                        <button class="search-btn"><i class="fas fa-search"></i></button>
                    </div>

                    <div class="cart-icon-container mr-4">
                        <i class="fas fa-shopping-cart fa-lg"></i>
                        <span class="cart-badge">0</span>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="hero-section position-relative overflow-hidden">
        
        <div class="hero-bg-image position-absolute w-100 h-100"></div>
        <div class="hero-bg-overlay position-absolute w-100 h-100"></div>

        <div class="hero-red-skew position-absolute"></div>

        <div class="container-fluid h-100 position-relative content-wrapper">
            <div class="row h-100 align-items-center">
                
                <div class="col-md-6 h-100 d-flex flex-column justify-content-center position-relative product-col">
                    
                    <div class="product-image-wrapper">
                        <img src="images/helmet-product.png" alt="Full Face Helmet" class="img-fluid helmet-img">
                    </div>
                    
                    <div class="product-feature-text mt-5 pl-5">
                        <h3 class="text-white text-uppercase">Polished Titanium Finish With<br>A Bright Blue Glowing Visor</h3>
                    </div>
                </div>

                <div class="col-md-6 d-flex flex-column justify-content-center pr-5 right-content">
                    <div class="text-center text-md-left pl-md-5">
                        <h2 class="text-white font-weight-bold text-uppercase sub-heading mb-0">Full Face</h2>
                        <h1 class="text-white font-weight-bold text-uppercase main-heading mb-3">Helmet</h1>
                        <p class="text-white description-text mb-4">Track racing, sports bikes, and high-speed highway commuting</p>
                        
                        <a href="#" class="btn btn-cta text-white font-weight-bold text-uppercase">Shop Now</a>
                    </div>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
